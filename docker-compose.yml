version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ai_detection_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Root
      MYSQL_DATABASE: ai_detection_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-run database schema and seed data on startup
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRoot"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_detection_web
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:mysql://db:3306/ai_detection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USER=root
      - DB_PASSWORD=Root
      - PYTHON_CMD=/opt/venv/bin/python
    volumes:
      # Persistent volume for user uploads so they survive container teardowns
      - uploads_data:/usr/local/tomcat/webapps/ai_object_detection_system/uploads

volumes:
  db_data:
  uploads_data:
